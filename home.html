<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bionic Arm Web Controller</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<img src="f.jpg" alt="Farmers Field" class="bg-image">

<div class="app">

    <div class="header">
        <h1>🌾 BIONIC ARM CONTROL</h1>
        <div class="status">Status: <span id="status">Disconnected</span></div>
    </div>

    <div class="nav">
        <button onclick="window.location.href='manual.html'">Manual</button>
        <button onclick="window.location.href='dashboard.html'">Dashboard</button>
        <button onclick="logout()">Logout</button>
    </div>

    <button class="connect-btn" onclick="connect()">Connect Arduino</button>

    <div class="control-section">
        <div class="angle-display" id="angleValueDisplay">0°</div>

        <div class="slider-row">
            <button onclick="decrease()">-</button>
            <input type="range" min="0" max="180" value="0" id="servoSlider">
            <button onclick="increase()">+</button>
        </div>

        <button class="connect-btn" style="margin-top:15px;" onclick="sendAngle()">
            SET SERVO
        </button>
    </div>

    <div class="footer">Neuro-Motion Interface v1.0</div>

</div>

<!-- Import Firebase script -->
<script type="module" src="script.js"></script>


  // ================= ARDUINO CONTROL =================
 <script>
  checkAuth();

  const NODEMCU_IP = "192.168.4.1"; // Change if needed

  const slider = document.getElementById("servoSlider");
  const angleDisplay = document.getElementById("angleValueDisplay");

  // Display angle
  slider.addEventListener("input", () => {
      angleDisplay.textContent = slider.value + "°";
  });

  function increase(){
      if(parseInt(slider.value) < 180){
          slider.value = parseInt(slider.value)+1;
          angleDisplay.textContent = slider.value + "°";
      }
  }

  function decrease(){
      if(parseInt(slider.value) > 0){
          slider.value = parseInt(slider.value)-1;
          angleDisplay.textContent = slider.value + "°";
      }
  }

  // Send angle to NodeMCU
  function sendAngle(){
      let angle = slider.value;

      fetch(`http://${NODEMCU_IP}/servo?angle=${angle}`)
      .then(res => res.text())
      .then(data => {
          document.getElementById("status").textContent = "Connected";
          document.getElementById("status").style.color = "green";
      })
      .catch(err => {
          document.getElementById("status").textContent = "Disconnected";
          document.getElementById("status").style.color = "red";
      });
  }
</script>
</body>
</html>
