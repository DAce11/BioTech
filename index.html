<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bionic Arm Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<img src="f.jpg" class="bg-image">

<div class="app">

    <div class="header">
        <h1>🔐 BIONIC ARM LOGIN</h1>
    </div>

    <!-- Login Form -->
    <form onsubmit="login(event)">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required placeholder="Enter your assigned email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="extra">
        <p>Need an account? <a href="mailto:admin@yourdomain.com">Contact Admin</a></p>
    </div>

</div>

<!-- Firebase and Script -->
<script type="module" src="script.js"></script>

</body>
</html>
